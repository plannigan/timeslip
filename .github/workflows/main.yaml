name: CI

# Workflow does NOT trigger on a feature branch until a pull request is created.
# Workflow will always run when a pull request is merged to the default branch.
on:
  pull_request: {}
  push:
    branches: ["main"]

permissions:
  contents: "read"

jobs:
  check:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
      with:
        distribution: "temurin"
        java-version: ${{ matrix.java-version }}
        cache: "gradle"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

    - name: Check
      run: "gradle check --info --stacktrace --console=plain"

    - name: Upload build reports
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: build-reports-${{ matrix.java-version }}
        path: build/reports/
      if: ${{ always() }}

    - name: Publish coverage results to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
      with:
        files: build/reports/jacoco/test/jacocoTestReport.xml
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
      if: ${{ always() }}

  renovate:
    runs-on: ubuntu-latest
    steps:
      # Renovate set the minimum node version to 22, but GitHub runners currently come with 20 installed
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24.12.0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🧼 lint renovate config # Validates changes to renovate.json config file
        uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: 'renovate.json'
